<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
  <rect width="800" height="200" fill="#050505"/>
  <style>
    text{font-family:'Courier New',monospace;fill:#444;font-size:11px}
    .label{fill:#666;font-size:11px;letter-spacing:1px}
    .pct{fill:#333;font-size:10px}
    .track{fill:#0f0f0f}
    .bar{fill:#ffffff}
    @keyframes grow90{from{width:0}to{width:504px}}
    @keyframes grow85{from{width:0}to{width:476px}}
    @keyframes grow80{from{width:0}to{width:448px}}
    @keyframes grow70{from{width:0}to{width:392px}}
    @keyframes dot-appear{0%,79%{opacity:0}80%,100%{opacity:1}}
    .b1{animation:grow90 1.8s cubic-bezier(0.4,0,0.2,1) 0.3s both}
    .b2{animation:grow85 1.8s cubic-bezier(0.4,0,0.2,1) 0.6s both}
    .b3{animation:grow80 1.8s cubic-bezier(0.4,0,0.2,1) 0.9s both}
    .b4{animation:grow70 1.8s cubic-bezier(0.4,0,0.2,1) 1.2s both}
    .d1{animation:dot-appear 2.1s 0.3s both}
    .d2{animation:dot-appear 2.1s 0.6s both}
    .d3{animation:dot-appear 2.1s 0.9s both}
    .d4{animation:dot-appear 2.1s 1.2s both}
    @keyframes fade-in{from{opacity:0}to{opacity:1}}
    .pct1{animation:fade-in 0.3s 2.1s both}
    .pct2{animation:fade-in 0.3s 2.4s both}
    .pct3{animation:fade-in 0.3s 2.7s both}
    .pct4{animation:fade-in 0.3s 3.0s both}
  </style>

  <!-- Row 1 -->
  <text class="label" x="20" y="38">artificial-intelligence</text>
  <rect class="track" x="220" y="28" width="560" height="1" rx="0"/>
  <rect class="bar b1" x="220" y="28" width="0" height="1"/>
  <circle class="d1" cx="724" cy="28" r="3" fill="#fff"/>
  <text class="pct pct1" x="742" y="32">90%</text>

  <!-- Row 2 -->
  <text class="label" x="20" y="88">cloud-computing</text>
  <rect class="track" x="220" y="78" width="560" height="1" rx="0"/>
  <rect class="bar b2" x="220" y="78" width="0" height="1"/>
  <circle class="d2" cx="696" cy="78" r="3" fill="#fff"/>
  <text class="pct pct2" x="714" y="82">85%</text>

  <!-- Row 3 -->
  <text class="label" x="20" y="138">backend-development</text>
  <rect class="track" x="220" y="128" width="560" height="1" rx="0"/>
  <rect class="bar b3" x="220" y="128" width="0" height="1"/>
  <circle class="d3" cx="668" cy="128" r="3" fill="#fff"/>
  <text class="pct pct3" x="686" y="132">80%</text>

  <!-- Row 4 -->
  <text class="label" x="20" y="188">railway-signalling</text>
  <rect class="track" x="220" y="178" width="560" height="1" rx="0"/>
  <rect class="bar b4" x="220" y="178" width="0" height="1"/>
  <circle class="d4" cx="612" cy="178" r="3" fill="#fff"/>
  <text class="pct pct4" x="630" y="182">70%</text>
</svg>
