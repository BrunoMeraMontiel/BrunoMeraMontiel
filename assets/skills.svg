<svg xmlns="http://www.w3.org/2000/svg" width="800" height="220" viewBox="0 0 800 220">
  <style>
    text{font-family:'Courier New',monospace}
    .label{fill:#c9d1d9;font-size:12px;letter-spacing:1px}
    .pct{fill:#39d353;font-size:11px;font-weight:bold}
    .track{fill:#21262d}
    .bar{fill:#39d353}
    @keyframes grow90{from{width:0}to{width:504px}}
    @keyframes grow85{from{width:0}to{width:476px}}
    @keyframes grow80{from{width:0}to{width:448px}}
    @keyframes grow70{from{width:0}to{width:392px}}
    @keyframes glow{0%,100%{opacity:1}50%{opacity:0.6}}
    @keyframes appear{0%,79%{opacity:0;transform:scale(0.5)}80%,100%{opacity:1;transform:scale(1)}}
    @keyframes fade-pct{from{opacity:0}to{opacity:1}}
    .b1{animation:grow90 1.6s cubic-bezier(0.4,0,0.2,1) 0.2s both}
    .b2{animation:grow85 1.6s cubic-bezier(0.4,0,0.2,1) 0.5s both}
    .b3{animation:grow80 1.6s cubic-bezier(0.4,0,0.2,1) 0.8s both}
    .b4{animation:grow70 1.6s cubic-bezier(0.4,0,0.2,1) 1.1s both}
    .d1{animation:appear 1.9s 0.2s both, glow 2s ease-in-out 2s infinite}
    .d2{animation:appear 1.9s 0.5s both, glow 2s ease-in-out 2.3s infinite}
    .d3{animation:appear 1.9s 0.8s both, glow 2s ease-in-out 2.6s infinite}
    .d4{animation:appear 1.9s 1.1s both, glow 2s ease-in-out 2.9s infinite}
    .pct1{animation:fade-pct 0.4s 1.9s both}
    .pct2{animation:fade-pct 0.4s 2.2s both}
    .pct3{animation:fade-pct 0.4s 2.5s both}
    .pct4{animation:fade-pct 0.4s 2.8s both}
  </style>

  <text class="label" x="20" y="34"><tspan fill="#39d353">▸</tspan> artificial-intelligence</text>
  <rect class="track" x="220" y="28" width="560" height="3" rx="1.5"/>
  <rect class="bar b1" x="220" y="28" width="0" height="3" rx="1.5"/>
  <circle class="d1" cx="724" cy="29.5" r="5" fill="#39d353"/>
  <text class="pct pct1" x="745" y="34">90%</text>

  <text class="label" x="20" y="84"><tspan fill="#39d353">▸</tspan> cloud-computing</text>
  <rect class="track" x="220" y="78" width="560" height="3" rx="1.5"/>
  <rect class="bar b2" x="220" y="78" width="0" height="3" rx="1.5"/>
  <circle class="d2" cx="696" cy="79.5" r="5" fill="#39d353"/>
  <text class="pct pct2" x="717" y="84">85%</text>

  <text class="label" x="20" y="134"><tspan fill="#39d353">▸</tspan> backend-development</text>
  <rect class="track" x="220" y="128" width="560" height="3" rx="1.5"/>
  <rect class="bar b3" x="220" y="128" width="0" height="3" rx="1.5"/>
  <circle class="d3" cx="668" cy="129.5" r="5" fill="#39d353"/>
  <text class="pct pct3" x="689" y="134">80%</text>

  <text class="label" x="20" y="184"><tspan fill="#39d353">▸</tspan> railway-signalling</text>
  <rect class="track" x="220" y="178" width="560" height="3" rx="1.5"/>
  <rect class="bar b4" x="220" y="178" width="0" height="3" rx="1.5"/>
  <circle class="d4" cx="612" cy="179.5" r="5" fill="#39d353"/>
  <text class="pct pct4" x="633" y="184">70%</text>
</svg>
