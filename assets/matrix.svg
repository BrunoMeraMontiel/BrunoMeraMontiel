<svg xmlns="http://www.w3.org/2000/svg" width="800" height="120" viewBox="0 0 800 120">
  <rect width="800" height="120" fill="#050505"/>
  <style>
    @keyframes fall0{0%{transform:translateY(-120px);opacity:0}10%{opacity:1}90%{opacity:0.6}100%{transform:translateY(120px);opacity:0}}
    @keyframes fall1{0%{transform:translateY(-120px);opacity:0}10%{opacity:1}90%{opacity:0.5}100%{transform:translateY(120px);opacity:0}}
    @keyframes flicker{0%,100%{opacity:1}50%{opacity:0.3}}
    text{font-family:'Courier New',monospace;font-size:11px;fill:#fff}
    .dim{fill:#222}
    .bright{fill:#fff;font-weight:bold}
    .col0{animation:fall0 2.1s linear infinite}
    .col1{animation:fall0 2.8s linear infinite 0.4s}
    .col2{animation:fall1 2.4s linear infinite 0.8s}
    .col3{animation:fall0 3.1s linear infinite 0.2s}
    .col4{animation:fall1 2.6s linear infinite 1.1s}
    .col5{animation:fall0 2.2s linear infinite 0.6s}
    .col6{animation:fall1 3.0s linear infinite 0.9s}
    .col7{animation:fall0 2.7s linear infinite 0.3s}
    .col8{animation:fall1 2.3s linear infinite 1.4s}
    .col9{animation:fall0 2.9s linear infinite 0.7s}
    .col10{animation:fall1 2.5s linear infinite 1.2s}
    .col11{animation:fall0 3.2s linear infinite 0.1s}
    .col12{animation:fall1 2.1s linear infinite 1.6s}
    .col13{animation:fall0 2.8s linear infinite 0.5s}
    .col14{animation:fall1 2.4s linear infinite 1.0s}
    .col15{animation:fall0 3.0s linear infinite 1.3s}
    .blink{animation:flicker 0.8s step-end infinite}
  </style>

