<svg xmlns="http://www.w3.org/2000/svg" width="800" height="260" viewBox="0 0 800 260">
  <rect width="800" height="260" fill="#050505"/>
  <style>
    text{font-family:'Courier New',monospace}
    .title{font-size:12px;fill:#cccccc;font-weight:bold}
    .desc{font-size:10px;fill:#333333}
    .tag{font-size:9px;fill:#222222;letter-spacing:1px}
    .border{fill:none;stroke:#111;stroke-width:1}
    .live-dot{fill:#666}
    .done-dot{fill:#222}
    @keyframes pulse{0%,100%{opacity:1;r:4}50%{opacity:0.2;r:3}}
    @keyframes slide-in-1{from{transform:translateX(-20px);opacity:0}to{transform:none;opacity:1}}
    @keyframes slide-in-2{from{transform:translateX(-20px);opacity:0}to{transform:none;opacity:1}}
    @keyframes slide-in-3{from{transform:translateX(-20px);opacity:0}to{transform:none;opacity:1}}
    @keyframes slide-in-4{from{transform:translateX(-20px);opacity:0}to{transform:none;opacity:1}}
    .p1{animation:slide-in-1 0.6s cubic-bezier(0.4,0,0.2,1) 0.1s both}
    .p2{animation:slide-in-2 0.6s cubic-bezier(0.4,0,0.2,1) 0.3s both}
    .p3{animation:slide-in-3 0.6s cubic-bezier(0.4,0,0.2,1) 0.5s both}
    .p4{animation:slide-in-4 0.6s cubic-bezier(0.4,0,0.2,1) 0.7s both}
    .live-pulse{animation:pulse 1.8s ease-in-out infinite}
    .status-live{font-size:9px;fill:#555;letter-spacing:2px}
    .status-done{font-size:9px;fill:#1e1e1e;letter-spacing:2px}
    .left-bar{fill:#fff}
    @keyframes bar-grow{from{height:0;y:100%}to{}}
  </style>

  <!-- Project 1 -->
  <g class="p1">
    <rect class="border" x="20" y="20" width="370" height="100" rx="0"/>
    <rect class="left-bar" x="20" y="20" width="2" height="100"/>
    <text class="title" x="36" y="42">tfg-interlocking-ai</text>
    <text class="desc" x="36" y="62">AI digitization of railway interlocking</text>
    <text class="desc" x="36" y="76">tables. ML meets critical infrastructure.</text>
    <circle class="live-pulse" cx="36" cy="100" r="4"/>
    <text class="status-live" x="48" y="104">IN PROGRESS</text>
  </g>

  <!-- Project 2 -->
  <g class="p2">
    <rect class="border" x="410" y="20" width="370" height="100" rx="0"/>
    <rect class="done-dot" x="410" y="20" width="2" height="100" fill="#1a1a1a"/>
    <text class="title" x="426" y="42">eshop-gcp</text>
    <text class="desc" x="426" y="62">E-commerce on Google Cloud App Engine.</text>
    <text class="desc" x="426" y="76">Full backend pipeline + CI/CD.</text>
    <text class="status-done" x="426" y="104">✓ COMPLETE</text>
  </g>

  <!-- Project 3 -->
  <g class="p3">
    <rect class="border" x="20" y="140" width="370" height="100" rx="0"/>
    <rect class="done-dot" x="20" y="140" width="2" height="100" fill="#1a1a1a"/>
    <text class="title" x="36" y="162">pso-benchmark</text>
    <text class="desc" x="36" y="182">Particle Swarm Optimization with</text>
    <text class="desc" x="36" y="196">parallel strategies + benchmarking.</text>
    <text class="status-done" x="36" y="224">✓ COMPLETE</text>
  </g>

  <!-- Project 4 placeholder -->
  <g class="p4">
    <rect class="border" x="410" y="140" width="370" height="100" rx="0" stroke-dasharray="4 4"/>
    <text class="title" x="426" y="162" fill="#1a1a1a">next_project</text>
    <text class="desc" x="426" y="182" fill="#161616">always building something.</text>
    <text class="desc" x="426" y="196" fill="#161616">stay tuned.</text>
    <text class="status-done" x="426" y="224">⚡ COMING SOON</text>
  </g>
</svg>
