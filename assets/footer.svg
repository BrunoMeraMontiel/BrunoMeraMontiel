<svg xmlns="http://www.w3.org/2000/svg" width="800" height="60" viewBox="0 0 800 60">
  <rect width="800" height="60" fill="#050505"/>
  <style>
    @keyframes scan{0%{transform:translateY(-60px)}100%{transform:translateY(60px)}}
    @keyframes fade{0%,100%{opacity:0.3}50%{opacity:1}}
    .scanline{animation:scan 4s linear infinite}
    text{font-family:'Courier New',monospace;font-size:10px;fill:#1e1e1e;text-anchor:middle;letter-spacing:8px}
    .txt{animation:fade 4s ease-in-out infinite}
  </style>
  <rect class="scanline" x="0" y="0" width="800" height="3" fill="rgba(255,255,255,0.015)"/>
  <line x1="0" y1="30" x2="800" y2="30" stroke="#0f0f0f" stroke-width="1"/>
  <text class="txt" x="400" y="50">LESS IS MORE · MADRID · ALWAYS BUILDING</text>
</svg>
