<svg xmlns="http://www.w3.org/2000/svg" width="800" height="60" viewBox="0 0 800 60">
  <style>
    text{font-family:'Courier New',monospace;font-size:10px;fill:#26a641;text-anchor:middle;letter-spacing:8px;opacity:0.6}
    line{stroke:#26a641;stroke-width:1;opacity:0.4}
    .heart{fill:#39d353}
    @keyframes fade{0%,100%{opacity:0.4}50%{opacity:0.9}}
    @keyframes beat{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
    .txt{animation:fade 3s ease-in-out infinite}
    .heart{animation:beat 1.4s ease-in-out infinite;transform-origin:center}
  </style>
  <line x1="100" y1="20" x2="700" y2="20"/>
  <text class="txt" x="400" y="42">LESS IS MORE · MADRID · ALWAYS BUILDING</text>
</svg>
