<svg xmlns="http://www.w3.org/2000/svg" width="800" height="160" viewBox="0 0 800 160">
  <defs>
    <clipPath id="c1"><rect x="0" y="20" width="800" height="40"/></clipPath>
    <clipPath id="c3"><rect x="0" y="80" width="800" height="40"/></clipPath>
  </defs>
  <style>
    .name{font-family:'Courier New',monospace;font-size:62px;font-weight:bold;fill:#c9d1d9;text-anchor:middle;letter-spacing:4px}
    .glitch-r{font-family:'Courier New',monospace;font-size:62px;font-weight:bold;fill:#39d353;text-anchor:middle;letter-spacing:4px;opacity:0}
    .glitch-b{font-family:'Courier New',monospace;font-size:62px;font-weight:bold;fill:#26a641;text-anchor:middle;letter-spacing:4px;opacity:0}
    .sub{font-family:'Courier New',monospace;font-size:13px;fill:#39d353;text-anchor:middle;letter-spacing:8px;opacity:0.7}
    @keyframes glitch-main{
      0%,89%,100%{transform:none}
      90%{transform:translateX(-3px)}
      92%{transform:translateX(4px)}
      94%{transform:translateX(-2px)}
      96%{transform:none}
    }
    @keyframes show-r{
      0%,88%,96%,100%{opacity:0;transform:translateX(0)}
      89%{opacity:0.85;transform:translateX(-7px)}
      92%{opacity:0.5;transform:translateX(5px)}
      94%{opacity:0.7;transform:translateX(-3px)}
    }
    @keyframes show-b{
      0%,88%,96%,100%{opacity:0;transform:translateX(0)}
      89%{opacity:0.85;transform:translateX(7px)}
      92%{opacity:0.5;transform:translateX(-4px)}
      94%{opacity:0.7;transform:translateX(3px)}
    }
    @keyframes pulse{0%,100%{opacity:0.7}50%{opacity:1}}
    @keyframes draw-line{from{stroke-dashoffset:600}to{stroke-dashoffset:0}}
    .name{animation:glitch-main 4s ease-in-out infinite 2s}
    .glitch-r{animation:show-r 4s ease-in-out infinite 2s}
    .glitch-b{animation:show-b 4s ease-in-out infinite 2s}
    .sub{animation:pulse 3s ease-in-out infinite}
    .topline{stroke:#26a641;stroke-width:1;stroke-dasharray:600;stroke-dashoffset:600;animation:draw-line 2s ease-out forwards}
    .botline{stroke:#26a641;stroke-width:1;stroke-dasharray:600;stroke-dashoffset:600;animation:draw-line 2s ease-out 0.3s forwards}
  </style>

  <line class="topline" x1="100" y1="35" x2="700" y2="35"/>

  <text class="glitch-r" x="400" y="95" clip-path="url(#c1)">BRUNO MERA</text>
  <text class="glitch-b" x="400" y="95" clip-path="url(#c3)">BRUNO MERA</text>
  <text class="name" x="400" y="95">BRUNO MERA</text>

  <line class="botline" x1="100" y1="115" x2="700" y2="115"/>

  <text class="sub" x="400" y="140">COMPUTER SCIENCE · MADRID · 2025</text>
</svg>
