<svg xmlns="http://www.w3.org/2000/svg" width="800" height="140" viewBox="0 0 800 140">
  <rect width="800" height="140" fill="#050505"/>
  <defs>
    <clipPath id="c1"><rect x="0" y="0" width="800" height="40"/></clipPath>
    <clipPath id="c2"><rect x="0" y="45" width="800" height="30"/></clipPath>
    <clipPath id="c3"><rect x="0" y="80" width="800" height="40"/></clipPath>
  </defs>
  <style>
    .name{font-family:'Courier New',monospace;font-size:64px;font-weight:bold;fill:#ffffff;text-anchor:middle}
    .glitch-r{font-family:'Courier New',monospace;font-size:64px;font-weight:bold;fill:#ff003c;text-anchor:middle;opacity:0}
    .glitch-b{font-family:'Courier New',monospace;font-size:64px;font-weight:bold;fill:#00eeff;text-anchor:middle;opacity:0}
    .sub{font-family:'Courier New',monospace;font-size:13px;fill:#333;text-anchor:middle;letter-spacing:6px}
    @keyframes glitch-main{
      0%,89%,100%{transform:none}
      90%{transform:translateX(-3px) skewX(-1deg)}
      92%{transform:translateX(4px) skewX(1deg)}
      94%{transform:translateX(-2px)}
      96%{transform:none}
    }
    @keyframes show-r{
      0%,88%,96%,100%{opacity:0;transform:translateX(0)}
      89%{opacity:0.9;transform:translateX(-8px)}
      92%{opacity:0.6;transform:translateX(5px)}
      94%{opacity:0.8;transform:translateX(-4px)}
    }
    @keyframes show-b{
      0%,88%,96%,100%{opacity:0;transform:translateX(0)}
      89%{opacity:0.9;transform:translateX(8px)}
      92%{opacity:0.6;transform:translateX(-5px)}
      94%{opacity:0.8;transform:translateX(4px)}
    }
    @keyframes sub-in{
      0%,100%{opacity:1}
      50%{opacity:0.4}
    }
    .name{animation:glitch-main 4s ease-in-out infinite 2s}
    .glitch-r{animation:show-r 4s ease-in-out infinite 2s}
    .glitch-b{animation:show-b 4s ease-in-out infinite 2s}
    .sub{animation:sub-in 3s ease-in-out infinite}
  </style>

  <text class="glitch-r" x="400" y="95" clip-path="url(#c1)">BRUNO MERA</text>
  <text class="glitch-b" x="400" y="95" clip-path="url(#c3)">BRUNO MERA</text>
  <text class="name" x="400" y="95">BRUNO MERA</text>
  <text class="sub" x="400" y="125">COMPUTER SCIENCE · MADRID · 2025</text>
</svg>
