    <text x="10" y="42">L</text><text x="10" y="56">ミ</text><text x="10" y="70">3</text>
    <text x="10" y="84">ム</text><text x="10" y="98">7</text><text x="10" y="112">メ</text>
    <text x="10" y="126">S</text><text x="10" y="140">モ</text><text x="10" y="154">9</text>
    <text x="10" y="168">ヤ</text><text x="10" y="182">2</text><text x="10" y="196" class="bright">█</text>
  </g>

  <!-- Column 2 at x=28 -->
  <g class="c1" style="animation-delay:0.8s">
    <text x="28" y="0">ユ</text><text x="28" y="14">5</text><text x="28" y="28">ヨ</text>
    <text x="28" y="42">R</text><text x="28" y="56">ラ</text><text x="28" y="70">8</text>
    <text x="28" y="84">リ</text><text x="28" y="98">N</text><text x="28" y="112">ル</text>
    <text x="28" y="126">0</text><text x="28" y="140">レ</text><text x="28" y="154">G</text>
    <text x="28" y="168">ロ</text><text x="28" y="182">4</text><text x="28" y="196" class="bright">█</text>
  </g>
  <g class="c3" style="animation-delay:2.2s">
    <text x="28" y="0">ワ</text><text x="28" y="14">I</text><text x="28" y="28">ヲ</text>
    <text x="28" y="42">7</text><text x="28" y="56">ン</text><text x="28" y="70">T</text>
    <text x="28" y="84">ヴ</text><text x="28" y="98">1</text><text x="28" y="112">B</text>
    <text x="28" y="126">ヵ</text><text x="28" y="140">6</text><text x="28" y="154">ヶ</text>
    <text x="28" y="168">S</text><text x="28" y="182">3</text><text x="28" y="196" class="bright">█</text>
  </g>
  <g class="c0" style="animation-delay:3.8s">
    <text x="28" y="0">A</text><text x="28" y="14">ッ</text><text x="28" y="28">9</text>
    <text x="28" y="42">ヅ</text><text x="28" y="56">2</text><text x="28" y="70">M</text>
    <text x="28" y="84">ヂ</text><text x="28" y="98">5</text><text x="28" y="112">ダ</text>
    <text x="28" y="126">E</text><text x="28" y="140">ザ</text><text x="28" y="154">8</text>
    <text x="28" y="168">サ</text><text x="28" y="182">R</text><text x="28" y="196" class="bright">█</text>
